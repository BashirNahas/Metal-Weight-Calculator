<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Calculate precise metal weights by shape and grade, with live market prices.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nahas MetalHub">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-180.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nahas MetalHub</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #0F0F1A;
    }
    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #0F0F1A;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #app-loading img {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      animation: app-loading-pulse 1.6s ease-in-out infinite;
    }
    #app-loading .app-loading-spinner {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid rgba(154, 140, 152, 0.25);
      border-top-color: #9A8C98;
      animation: app-loading-spin 0.8s linear infinite;
    }
    #app-loading .app-loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    @keyframes app-loading-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes app-loading-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    #app-loading.app-loading-hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app-loading">
    <img src="icons/Icon-192.png" alt="Nahas MetalHub">
    <div class="app-loading-spinner"></div>
    <div class="app-loading-text">Loading…</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('app-loading');
      if (!loading) return;
      loading.classList.add('app-loading-hidden');
      setTimeout(function () { loading.remove(); }, 400);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
