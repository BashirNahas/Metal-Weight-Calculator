name: metal_weight_calculator
description: "Nahas MetalHub - professional metal weight calculator with live market prices - by Synaptix"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.3.1
  font_awesome_flutter: ^10.8.0

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.4

  # Networking
  http: ^1.2.2

  # Utilities
  intl: ^0.19.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.14.2"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#22223B"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#0F0F1A"
    theme_color: "#0F0F1A"

flutter:
  uses-material-design: true

  assets:
    - assets/splash.png
    - assets/success_animation.json
    - assets/logo.png
