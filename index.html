<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="/Metal-Weight-Calculator/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Metal Weight Calculator — حساب وزن المعادن. Calculate copper, aluminum and iron plate weights instantly. Powered by Synaptix.">
  <meta name="keywords" content="metal weight, copper, aluminum, iron, calculator, حساب وزن المعادن, نحاس, حديد">
  <meta name="author" content="Synaptix">
  <meta name="theme-color" content="#22223B">

  <!-- Open Graph -->
  <meta property="og:title" content="Metal Weight Calculator | حساب وزن المعادن">
  <meta property="og:description" content="Calculate metal plate weights instantly — copper, aluminum, iron. Live market prices. Powered by Synaptix.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="logo.png">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Metal Weight">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="apple-touch-icon" sizes="152x152" href="logo.png">
  <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
  <link rel="apple-touch-icon" sizes="167x167" href="logo.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Metal Weight Calculator | حساب وزن المعادن</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash while Flutter initialises */
    body {
      margin: 0;
      padding: 0;
      background-color: #0F0F1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    #splash img {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(74,78,105,0.5);
    }
    #splash p {
      color: #9A8C98;
      font-family: sans-serif;
      font-size: 14px;
      margin: 0;
      letter-spacing: 0.5px;
    }
    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(154,140,152,0.2);
      border-top-color: #4A4E69;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #flutter-loading { display: none; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="logo.png" alt="Metal Weight Calculator">
    <div class="loader"></div>
    <p>Powered by Synaptix</p>
  </div>

  <script>
    // Remove splash once Flutter is ready
    window.addEventListener('flutter-first-frame', () => {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.style.transition = 'opacity 0.4s';
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 400);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
